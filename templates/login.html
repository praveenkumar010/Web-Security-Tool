<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black flex items-center justify-center min-h-screen text-white">

    <div class="bg-gray-900 border border-red-500 p-10 rounded-2xl w-[400px]">

        <h1 class="text-4xl font-bold text-red-500 mb-8 text-center">
            ADMIN LOGIN
        </h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                class="w-full p-4 rounded-lg text-black mb-5"
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                class="w-full p-4 rounded-lg text-black mb-5"
            >

            <button
                class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-lg font-bold"
            >
                LOGIN
            </button>

        </form>

    </div>

</body>
</html>
